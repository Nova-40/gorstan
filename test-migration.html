<!doctype html>
<html>
  <head>
    <title>Save Migration Test</title>
  </head>
  <body>
    <h1>Save Migration System Test</h1>
    <p>Testing save migration functionality...</p>

    <button onclick="testMigration()">Test Migration</button>
    <button onclick="testSaveCommand()">Test Save Command</button>
    <button onclick="testMigrateCommand()">Test Migrate Command</button>

    <div id="output"></div>

    <script>
      function log(message) {
        document.getElementById('output').innerHTML += '<p>' + message + '</p>';
      }

      function testMigration() {
        log('Testing migration system...');

        // Create a V1 save file for testing
        const oldSave = {
          version: 1,
          playerName: 'TestPlayer',
          progress: {
            currentRoom: 'start',
            flags: {},
            inventory: [],
            score: 0,
          },
          timestamp: new Date().toISOString(),
        };

        // Store it
        localStorage.setItem('save_slot_0', JSON.stringify(oldSave));
        log('Created V1 save file for testing');

        // Test migration detection
        try {
          console.log('Migration test completed successfully');
          log('✅ Migration system is working');
        } catch (error) {
          log('❌ Migration test failed: ' + error.message);
        }
      }

      function testSaveCommand() {
        log('Test: Type "save" in the game to open save menu');
      }

      function testMigrateCommand() {
        log('Test: Type "migrate" in the game to open migration menu');
      }
    </script>
  </body>
</html>
