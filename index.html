     index.html — Main HTML entry point for Gorstan Game React app.

     - Uses Tailwind CSS classes for base styling.
     - React app is mounted into #root.
     - No unused or broken imports/scripts.
     - All logic and structure preserved for React integration.
     - Accessible, responsive, and robust for modern browsers.
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gorstan</title>
    <meta name="color-scheme" content="dark" />
    <style>
      /* Critical inline styles to prevent white flash before app & Tailwind load */
      html,body { background:#000; color:#22c55e; margin:0; padding:0; height:100%; }
      #root { min-height:100vh; display:flex; align-items:center; justify-content:center; }
      #pre-splash { text-align:center; font-family: monospace; }
      #pre-splash h1 { font-size: clamp(3rem,10vw,6rem); margin:0 0 .5rem; letter-spacing:4px; color:#00ff00; text-shadow:0 0 6px #00ff00,0 0 14px #00ff00; animation: prePulse 1.4s ease-in-out infinite; }
      #pre-splash p { margin:0; font-size:1.1rem; color:#0ff; text-shadow:0 0 4px #0ff; opacity:.85; }
      @keyframes prePulse { 0%,100%{ opacity:.85;} 50%{ opacity:1;} }
      .no-js-msg { padding:2rem; }
    </style>
    <!--
      Gorstan v2.8.3+:
      - Tailwind CSS should be included via your build pipeline (not directly here).
      - All meta tags and structure are minimal and robust.
      - No dead code or unused scripts.
      - Add favicon or manifest as needed for PWA support.
    -->
    <!-- Example: <link rel="icon" href="/favicon.ico" /> -->
  </head>
  <body class="bg-background text-console font-mono min-h-screen">
    <!--
      #root is where the React app is mounted.
      All UI is rendered inside this container.
    -->
    <div id="root">
      <div id="pre-splash" aria-hidden="true">
        <h1>GORSTAN</h1>
        <p>Initializing...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Defensive: If JS fails to load, show a fallback message.
    -->
    <noscript>
      <div class="bg-background text-error font-mono text-center p-8">
        Gorstan requires JavaScript to run. Please enable JavaScript in your browser.
      </div>
    </noscript>
  </body>
</html>
